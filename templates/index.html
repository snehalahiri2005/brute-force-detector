<!DOCTYPE html>
<html>
<head>
<title>SOC Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#f8fafc;
    color:#1e293b;
}

/* layout */
.container { display:flex; }
.sidebar {
    width:220px;
    background:#1e293b;
    color:white;
    height:100vh;
    padding:20px;
}
.sidebar div {
    margin:15px 0;
    cursor:pointer;
}

.main {
    flex:1;
    padding:20px;
}

/* cards */
.card {
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.grid {
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:10px;
}

h1 { margin-bottom:10px; }

/* status */
.status {
    padding:10px;
    border-radius:5px;
    margin-bottom:10px;
}
.safe { background:#dcfce7; }
.alert { background:#fee2e2; }

/* form */
input,button {
    padding:8px;
    margin:5px;
}
button {
    background:#2563eb;
    color:white;
    border:none;
}

/* table */
table {
    width:100%;
    border-collapse:collapse;
}
td,th {
    border:1px solid #ddd;
    padding:6px;
}

.hidden { display:none; }

.low { color:green; }
.medium { color:orange; }
.high { color:red; }
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h2>SOC</h2>
<div onclick="tab('dash')">Dashboard</div>
<div onclick="tab('logs')">Logs</div>
<div onclick="tab('control')">Control</div>
</div>

<div class="main">

<h1>Security Dashboard</h1>

<div id="status" class="status safe">System normal</div>

<div id="dash">

<div class="card">
<form method="POST">
<input name="username" placeholder="username">
<input name="password" type="password">
<button>Login</button>
</form>

<button onclick="simulate()">Simulate Attack</button>
<p>{{ message }}</p>
</div>

<div class="grid">
<div class="card">Attacks: <span id="fail"></span></div>
<div class="card">Success: <span id="success"></span></div>
<div class="card">Blocked: <span id="blocked"></span></div>
<div class="card">Top IP: <span id="top"></span></div>
</div>

<div class="card">
<canvas id="line"></canvas>
</div>

<div class="card">
<canvas id="pie"></canvas>
</div>

</div>

<div id="logs" class="hidden">
<div class="card">
<table>
<tr><th>IP</th><th>User</th><th>Threat</th><th>Type</th></tr>
<tbody id="log"></tbody>
</table>
</div>
</div>

<div id="control" class="hidden">
<div class="card">
<button onclick="reset()">Reset</button>
<button onclick="exportLogs()">Export Logs</button>
</div>
</div>

</div>
</div>

<script>
let lineChart, pieChart;

function tab(id){
document.querySelectorAll("#dash,#logs,#control").forEach(x=>x.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

async function load(){
const res=await fetch("/logs",{headers:{"x-api-key":"soc-secret-key"}});
const data=await res.json();

fail.innerText=data.fail;
success.innerText=data.success;
blocked.innerText=data.blocked_ips.length;
top.innerText=data.top_ip;

status.className = data.fail>10 ? "status alert" : "status safe";

const times=data.timeline.map(t=>t.time);
const counts=data.timeline.map(t=>t.count);

if(lineChart) lineChart.destroy();
lineChart=new Chart(document.getElementById("line"),{
type:"line",
data:{labels:times,datasets:[{data:counts}]}
});

if(pieChart) pieChart.destroy();
pieChart=new Chart(document.getElementById("pie"),{
type:"pie",
data:{labels:["Success","Fail"],datasets:[{data:[data.success,data.fail]}]}
});

log.innerHTML=data.logs.map(l=>`
<tr>
<td>${l.ip}</td>
<td>${l.user}</td>
<td class="${l.threat.toLowerCase()}">${l.threat}</td>
<td>${l.type}</td>
</tr>`).join("");
}

function simulate(){
for(let i=0;i<10;i++){
fetch("/",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"username=hacker&password=wrong"
});
}
}

function reset(){ fetch("/reset"); }
function exportLogs(){ window.location="/export"; }

setInterval(load,2000);
</script>

</body>
</html>
