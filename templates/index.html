<!DOCTYPE html>
<html>
<head>
    <title>Cyber SOC Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background:#020617; color:white; font-family:Arial; }
        h1 { text-align:center; }

        .grid {
            display:grid;
            grid-template-columns: repeat(2,1fr);
            gap:20px;
            padding:20px;
        }

        .card {
            background:#0f172a;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px cyan;
        }

        table { width:100%; }
        td,th { padding:8px; border-bottom:1px solid #334155; }

        .alert {
            background:red;
            padding:10px;
            text-align:center;
            display:none;
        }
    </style>
</head>

<body>

<h1>🔐 SOC Cyber Attack Dashboard</h1>
<div class="alert" id="alert">⚠️ HIGH THREAT DETECTED</div>

<div class="grid">

<div class="card">
<h3>Login</h3>
<form method="POST">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>
<p>{{ message }}</p>
</div>

<div class="card">
<h3>Threat Level</h3>
<p id="threat">LOW</p>
</div>

<div class="card">
<h3>Attack Graph</h3>
<canvas id="line"></canvas>
</div>

<div class="card">
<h3>Success vs Fail</h3>
<canvas id="pie"></canvas>
</div>

<div class="card" style="grid-column: span 2;">
<h3>Logs</h3>
<table>
<thead>
<tr><th>IP</th><th>Time</th><th>Status</th><th>Location</th></tr>
</thead>
<tbody id="logs"></tbody>
</table>
</div>

</div>

<script>
let lineChart, pieChart;

async function loadData() {
    const res = await fetch('/logs');
    const data = await res.json();

    const ips = Object.keys(data.attempts);
    const values = Object.values(data.attempts);

    // LINE CHART
    if(lineChart) lineChart.destroy();
    lineChart = new Chart(document.getElementById('line'), {
        type:'line',
        data:{ labels:ips, datasets:[{label:'Attempts', data:values, borderColor:'cyan'}]}
    });

    // PIE
    if(pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById('pie'), {
        type:'pie',
        data:{
            labels:['Success','Fail'],
            datasets:[{data:[data.success, data.fail]}]
        }
    });

    // LOG TABLE
    let table="";
    data.logs.forEach(l=>{
        table+=`<tr>
        <td>${l.ip}</td>
        <td>${l.time}</td>
        <td>${l.status}</td>
        <td>${l.location}</td>
        </tr>`;
    });
    document.getElementById("logs").innerHTML = table;

    // THREAT LEVEL
    let total = data.fail;
    let threat = document.getElementById("threat");
    let alert = document.getElementById("alert");

    if(total < 5){
        threat.innerText="LOW";
        alert.style.display="none";
    }
    else if(total < 10){
        threat.innerText="MEDIUM";
        alert.style.display="none";
    }
    else{
        threat.innerText="HIGH";
        alert.style.display="block";
    }
}

setInterval(loadData,2000);
</script>

</body>
</html>
